<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Philosophy ～ ふたつの世界線 ～</title>
<meta name="description" content="株式会社Stockが大切にしている10の考え方を、パラレルワールドの探索を通じて学ぶオンボーディング教材">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== CSS RESET & VARIABLES ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Brand Colors */
  --stock-blue: #002b4e;
  --stock-blue-light: #1a4a6e;
  --stock-accent: #4ecdc4;
  --stock-warm: #f7a072;
  --stock-gold: #ffd93d;

  /* World A (With Philosophy) */
  --wa-bg: linear-gradient(135deg, #e8f4f8 0%, #f0f9ff 50%, #fef9ef 100%);
  --wa-card: rgba(255,255,255,0.92);
  --wa-text: #1a2a3a;
  --wa-accent: #4ecdc4;
  --wa-glow: rgba(78,205,196,0.3);
  --wa-border: rgba(78,205,196,0.3);

  /* World B (Without Philosophy) */
  --wb-bg: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  --wb-card: rgba(30,30,50,0.85);
  --wb-text: #b0b8c8;
  --wb-accent: #e94560;
  --wb-glow: rgba(233,69,96,0.3);
  --wb-border: rgba(233,69,96,0.3);

  /* Common */
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 8px 32px rgba(0,0,0,0.12);
  --shadow-lg: 0 16px 48px rgba(0,0,0,0.18);
  --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  --font-main: 'Noto Sans JP', 'Inter', sans-serif;
}

html { font-size: 16px; scroll-behavior: smooth; }

body {
  font-family: var(--font-main);
  background: #0a0a1a;
  color: #e0e0e0;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ===== SCREEN SYSTEM ===== */
.screen {
  display: none;
  min-height: 100vh;
  position: relative;
  animation: fadeIn 0.6s ease;
}
.screen.active { display: flex; flex-direction: column; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(40px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

@keyframes glitch {
  0% { transform: translate(0); }
  20% { transform: translate(-2px, 2px); }
  40% { transform: translate(2px, -2px); }
  60% { transform: translate(-1px, -1px); }
  80% { transform: translate(1px, 1px); }
  100% { transform: translate(0); }
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

@keyframes shimmer {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}

@keyframes portalOpen {
  0% { transform: scale(0) rotate(0deg); opacity: 0; }
  50% { transform: scale(1.2) rotate(180deg); opacity: 1; }
  100% { transform: scale(1) rotate(360deg); opacity: 1; }
}

@keyframes confetti-fall {
  0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

@keyframes typewriter {
  from { width: 0; }
  to { width: 100%; }
}

/* ===== TITLE SCREEN ===== */
#title-screen {
  background: linear-gradient(135deg, #0a0a2e 0%, #1a1a4e 30%, #002b4e 60%, #0a2a3e 100%);
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 2rem;
  position: relative;
  overflow: hidden;
}

#title-screen::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(circle at 20% 30%, rgba(78,205,196,0.08) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(247,160,114,0.08) 0%, transparent 50%),
    radial-gradient(circle at 50% 50%, rgba(255,217,61,0.05) 0%, transparent 40%);
  pointer-events: none;
}

.stars {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  overflow: hidden;
}
.star {
  position: absolute;
  width: 3px; height: 3px;
  background: rgba(255,255,255,0.6);
  border-radius: 50%;
  animation: float 3s ease-in-out infinite;
}

.title-content {
  position: relative;
  z-index: 2;
  max-width: 640px;
}

.title-logo {
  font-size: 0.9rem;
  letter-spacing: 0.3em;
  color: var(--stock-accent);
  text-transform: uppercase;
  margin-bottom: 1.5rem;
  font-weight: 500;
}

.title-main {
  font-size: clamp(2rem, 6vw, 3.5rem);
  font-weight: 900;
  line-height: 1.3;
  margin-bottom: 0.5rem;
  background: linear-gradient(135deg, #fff 0%, var(--stock-accent) 50%, var(--stock-warm) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.title-sub {
  font-size: clamp(1rem, 2.5vw, 1.3rem);
  color: rgba(255,255,255,0.6);
  margin-bottom: 2.5rem;
  font-weight: 300;
  line-height: 1.6;
}

.title-desc {
  font-size: 0.9rem;
  color: rgba(255,255,255,0.45);
  line-height: 1.8;
  margin-bottom: 3rem;
  max-width: 480px;
  margin-left: auto;
  margin-right: auto;
}

.btn-start {
  display: inline-flex;
  align-items: center;
  gap: 0.75rem;
  padding: 1rem 2.5rem;
  border: none;
  border-radius: 50px;
  background: linear-gradient(135deg, var(--stock-accent), #3db8b0);
  color: #fff;
  font-size: 1.1rem;
  font-weight: 700;
  font-family: var(--font-main);
  cursor: pointer;
  transition: var(--transition);
  box-shadow: 0 4px 24px rgba(78,205,196,0.3);
  letter-spacing: 0.05em;
}
.btn-start:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 32px rgba(78,205,196,0.5);
}
.btn-start .arrow {
  font-size: 1.3rem;
  transition: transform 0.3s;
}
.btn-start:hover .arrow { transform: translateX(4px); }

/* ===== CHAPTER SELECT ===== */
#chapter-select {
  background: linear-gradient(135deg, #0a0a2e 0%, #1a1a4e 50%, #002b4e 100%);
  padding: 2rem;
  align-items: center;
}

.chapter-header {
  text-align: center;
  padding: 2rem 0 1.5rem;
}
.chapter-header h2 {
  font-size: 1.6rem;
  font-weight: 700;
  color: #fff;
  margin-bottom: 0.5rem;
}
.chapter-header p {
  color: rgba(255,255,255,0.5);
  font-size: 0.9rem;
}

.chapter-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1rem;
  max-width: 960px;
  width: 100%;
  padding: 1rem 0 2rem;
}

.chapter-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius);
  padding: 1.5rem;
  cursor: pointer;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}
.chapter-card:hover {
  background: rgba(255,255,255,0.1);
  border-color: var(--stock-accent);
  transform: translateY(-4px);
  box-shadow: 0 8px 32px rgba(78,205,196,0.15);
}
.chapter-card.locked {
  opacity: 0.4;
  cursor: not-allowed;
  pointer-events: none;
}
.chapter-card.completed {
  border-color: rgba(78,205,196,0.4);
  background: rgba(78,205,196,0.08);
}
.chapter-card.completed::after {
  content: '✓';
  position: absolute;
  top: 1rem;
  right: 1rem;
  width: 28px; height: 28px;
  background: var(--stock-accent);
  color: #fff;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.85rem;
  font-weight: 700;
}

.chapter-num {
  font-size: 0.75rem;
  color: var(--stock-accent);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 0.5rem;
  font-weight: 600;
}
.chapter-title {
  font-size: 1.05rem;
  font-weight: 700;
  color: #fff;
  margin-bottom: 0.5rem;
  line-height: 1.4;
}
.chapter-excerpt {
  font-size: 0.8rem;
  color: rgba(255,255,255,0.45);
  line-height: 1.5;
}

.progress-bar-container {
  max-width: 960px;
  width: 100%;
  margin-bottom: 1.5rem;
}
.progress-label {
  font-size: 0.8rem;
  color: rgba(255,255,255,0.5);
  margin-bottom: 0.5rem;
  display: flex;
  justify-content: space-between;
}
.progress-bar {
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--stock-accent), var(--stock-warm));
  border-radius: 3px;
  transition: width 0.6s ease;
}

/* ===== GAME SCREEN ===== */
#game-screen {
  min-height: 100vh;
  transition: background 0.8s ease;
}

#game-screen.world-a {
  background: var(--wa-bg);
  color: var(--wa-text);
}
#game-screen.world-b {
  background: var(--wb-bg);
  color: var(--wb-text);
}
#game-screen.world-reflect {
  background: linear-gradient(135deg, #1a1a3e 0%, #2a2a5e 50%, #1a3a5e 100%);
  color: #e0e0e0;
}
#game-screen.world-story {
  background: linear-gradient(135deg, #002b4e 0%, #003d6e 50%, #002040 100%);
  color: #e0e0e0;
}

/* Game Top Bar */
.game-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 1.5rem;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.world-a .game-topbar { background: rgba(255,255,255,0.7); }
.world-b .game-topbar { background: rgba(10,10,30,0.7); }
.world-reflect .game-topbar,
.world-story .game-topbar { background: rgba(10,10,30,0.7); }

.topbar-left {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.btn-back {
  background: none;
  border: 1px solid rgba(128,128,128,0.3);
  border-radius: 8px;
  padding: 0.4rem 0.8rem;
  font-size: 0.8rem;
  cursor: pointer;
  transition: var(--transition);
  font-family: var(--font-main);
}
.world-a .btn-back { color: var(--wa-text); }
.world-b .btn-back,
.world-reflect .btn-back,
.world-story .btn-back { color: #b0b8c8; }
.btn-back:hover { background: rgba(128,128,128,0.15); }

.world-indicator {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.8rem;
  font-weight: 600;
  letter-spacing: 0.05em;
}
.world-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  animation: pulse 2s infinite;
}
.world-a .world-dot { background: var(--wa-accent); box-shadow: 0 0 8px var(--wa-glow); }
.world-b .world-dot { background: var(--wb-accent); box-shadow: 0 0 8px var(--wb-glow); }
.world-reflect .world-dot { background: #a78bfa; box-shadow: 0 0 8px rgba(167,139,250,0.3); }
.world-story .world-dot { background: var(--stock-gold); box-shadow: 0 0 8px rgba(255,217,61,0.3); }

.step-indicator {
  font-size: 0.75rem;
  color: rgba(128,128,128,0.6);
}

/* Game Content */
.game-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1.5rem 3rem;
  max-width: 720px;
  margin: 0 auto;
  width: 100%;
}

.scene-card {
  width: 100%;
  border-radius: var(--radius);
  padding: 2rem;
  animation: slideUp 0.5s ease;
  position: relative;
}
.world-a .scene-card {
  background: var(--wa-card);
  border: 1px solid var(--wa-border);
  box-shadow: var(--shadow);
}
.world-b .scene-card {
  background: var(--wb-card);
  border: 1px solid var(--wb-border);
  box-shadow: var(--shadow);
}
.world-reflect .scene-card {
  background: rgba(60,50,100,0.5);
  border: 1px solid rgba(167,139,250,0.3);
  box-shadow: var(--shadow);
}
.world-story .scene-card {
  background: rgba(0,43,78,0.6);
  border: 1px solid rgba(255,217,61,0.2);
  box-shadow: var(--shadow);
}

.scene-emoji {
  font-size: 3rem;
  margin-bottom: 1rem;
  display: block;
}

.scene-label {
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  font-weight: 700;
  margin-bottom: 1rem;
  display: inline-block;
  padding: 0.25rem 0.75rem;
  border-radius: 20px;
}
.world-a .scene-label { color: var(--wa-accent); background: rgba(78,205,196,0.1); }
.world-b .scene-label { color: var(--wb-accent); background: rgba(233,69,96,0.1); }
.world-reflect .scene-label { color: #a78bfa; background: rgba(167,139,250,0.1); }
.world-story .scene-label { color: var(--stock-gold); background: rgba(255,217,61,0.1); }

.scene-title {
  font-size: 1.4rem;
  font-weight: 700;
  margin-bottom: 1rem;
  line-height: 1.4;
}
.world-a .scene-title { color: var(--wa-text); }
.world-b .scene-title { color: #fff; }
.world-reflect .scene-title,
.world-story .scene-title { color: #fff; }

.scene-text {
  font-size: 0.95rem;
  line-height: 1.8;
  margin-bottom: 1.5rem;
}
.world-a .scene-text { color: #4a5568; }
.world-b .scene-text { color: #8899aa; }
.world-reflect .scene-text,
.world-story .scene-text { color: rgba(255,255,255,0.7); }

.scene-dialogue {
  padding: 1.2rem 1.5rem;
  border-radius: var(--radius-sm);
  margin: 1rem 0;
  font-size: 0.95rem;
  line-height: 1.7;
  position: relative;
}
.world-a .scene-dialogue {
  background: rgba(78,205,196,0.08);
  border-left: 3px solid var(--wa-accent);
  color: var(--wa-text);
}
.world-b .scene-dialogue {
  background: rgba(233,69,96,0.08);
  border-left: 3px solid var(--wb-accent);
  color: var(--wb-text);
}
.world-story .scene-dialogue {
  background: rgba(255,217,61,0.08);
  border-left: 3px solid var(--stock-gold);
  color: rgba(255,255,255,0.85);
}

.dialogue-speaker {
  font-size: 0.8rem;
  font-weight: 700;
  margin-bottom: 0.4rem;
  display: block;
}
.world-a .dialogue-speaker { color: var(--wa-accent); }
.world-b .dialogue-speaker { color: var(--wb-accent); }
.world-story .dialogue-speaker { color: var(--stock-gold); }

/* Choice Buttons */
.choices {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
  width: 100%;
  margin-top: 1.5rem;
}

.choice-btn {
  width: 100%;
  text-align: left;
  padding: 1rem 1.25rem;
  border-radius: var(--radius-sm);
  font-size: 0.95rem;
  line-height: 1.5;
  font-family: var(--font-main);
  cursor: pointer;
  transition: var(--transition);
  border: 1px solid;
  background: transparent;
}
.world-a .choice-btn,
.world-reflect .choice-btn {
  color: var(--wa-text);
  border-color: rgba(78,205,196,0.3);
  background: rgba(78,205,196,0.05);
}
.world-a .choice-btn:hover,
.world-reflect .choice-btn:hover {
  background: rgba(78,205,196,0.15);
  border-color: var(--wa-accent);
  transform: translateX(4px);
}
.world-b .choice-btn {
  color: var(--wb-text);
  border-color: rgba(233,69,96,0.2);
  background: rgba(233,69,96,0.05);
}
.world-b .choice-btn:hover {
  background: rgba(233,69,96,0.15);
  border-color: var(--wb-accent);
  transform: translateX(4px);
}
.world-reflect .choice-btn {
  color: #e0e0e0;
  border-color: rgba(167,139,250,0.3);
  background: rgba(167,139,250,0.05);
}
.world-reflect .choice-btn:hover {
  background: rgba(167,139,250,0.15);
  border-color: #a78bfa;
  transform: translateX(4px);
}

.choice-btn.selected {
  border-width: 2px;
}
.world-a .choice-btn.selected,
.world-reflect .choice-btn.selected {
  border-color: var(--wa-accent);
  background: rgba(78,205,196,0.15);
}

/* Navigation Buttons */
.btn-next {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.9rem 2rem;
  border: none;
  border-radius: 50px;
  font-size: 1rem;
  font-weight: 600;
  font-family: var(--font-main);
  cursor: pointer;
  transition: var(--transition);
  margin-top: 2rem;
}
.world-a .btn-next {
  background: linear-gradient(135deg, var(--wa-accent), #3db8b0);
  color: #fff;
  box-shadow: 0 4px 16px rgba(78,205,196,0.3);
}
.world-b .btn-next {
  background: linear-gradient(135deg, #e94560, #c73550);
  color: #fff;
  box-shadow: 0 4px 16px rgba(233,69,96,0.3);
}
.world-reflect .btn-next {
  background: linear-gradient(135deg, #a78bfa, #8b5cf6);
  color: #fff;
  box-shadow: 0 4px 16px rgba(167,139,250,0.3);
}
.world-story .btn-next {
  background: linear-gradient(135deg, var(--stock-gold), #f0c030);
  color: var(--stock-blue);
  box-shadow: 0 4px 16px rgba(255,217,61,0.3);
}
.btn-next:hover {
  transform: translateY(-2px);
  filter: brightness(1.1);
}

/* Portal Transition */
.portal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
}
.portal-overlay.active {
  opacity: 1;
  pointer-events: all;
}

.portal-circle {
  width: 0;
  height: 0;
  border-radius: 50%;
  transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}
.portal-overlay.active .portal-circle {
  width: 200vmax;
  height: 200vmax;
}
.portal-to-a .portal-circle { background: rgba(232,244,248,0.97); }
.portal-to-b .portal-circle { background: rgba(26,26,46,0.97); }
.portal-to-reflect .portal-circle { background: rgba(26,26,62,0.97); }
.portal-to-story .portal-circle { background: rgba(0,43,78,0.97); }

.portal-text {
  position: absolute;
  font-size: 1.2rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  opacity: 0;
  transition: opacity 0.3s 0.4s;
}
.portal-overlay.active .portal-text { opacity: 1; }
.portal-to-a .portal-text { color: var(--wa-accent); }
.portal-to-b .portal-text { color: var(--wb-accent); }
.portal-to-reflect .portal-text { color: #a78bfa; }
.portal-to-story .portal-text { color: var(--stock-gold); }

/* Reflection options */
.reflect-option {
  width: 100%;
  text-align: left;
  padding: 1.2rem 1.5rem;
  border-radius: var(--radius-sm);
  border: 1px solid rgba(167,139,250,0.25);
  background: rgba(167,139,250,0.05);
  color: #e0e0e0;
  font-size: 0.95rem;
  line-height: 1.5;
  cursor: pointer;
  font-family: var(--font-main);
  transition: var(--transition);
}
.reflect-option:hover {
  background: rgba(167,139,250,0.15);
  border-color: #a78bfa;
  transform: translateX(4px);
}

.reflect-response {
  padding: 1.5rem;
  border-radius: var(--radius-sm);
  background: rgba(167,139,250,0.1);
  border: 1px solid rgba(167,139,250,0.2);
  margin-top: 1.5rem;
  animation: slideUp 0.5s ease;
}
.reflect-response p {
  color: rgba(255,255,255,0.8);
  font-size: 0.95rem;
  line-height: 1.8;
}

/* Stock Quote */
.stock-quote {
  border-radius: var(--radius-sm);
  padding: 1.5rem;
  margin-top: 1rem;
  position: relative;
}
.world-story .stock-quote {
  background: rgba(255,217,61,0.06);
  border: 1px solid rgba(255,217,61,0.15);
}
.stock-quote::before {
  content: '"';
  position: absolute;
  top: -0.5rem;
  left: 1rem;
  font-size: 3rem;
  color: var(--stock-gold);
  opacity: 0.3;
  font-family: Georgia, serif;
}
.stock-quote p {
  font-size: 1rem;
  line-height: 1.8;

// ===== GAME STATE =====
let gameState = {
  currentChapter: 0,
  currentStep: 0,
  completed: [],
  reflections: []
};

// Load saved state
function loadState() {
  const saved = localStorage.getItem('stock-philosophy-game');
  if (saved) {
    try { gameState = JSON.parse(saved); } catch(e) {}
  }
}
function saveState() {
  localStorage.setItem('stock-philosophy-game', JSON.stringify(gameState));
}

// ===== STARS ANIMATION =====
function createStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 50; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.animationDelay = Math.random() * 3 + 's';
    star.style.animationDuration = (2 + Math.random() * 3) + 's';
    star.style.opacity = 0.2 + Math.random() * 0.6;
    star.style.width = star.style.height = (1 + Math.random() * 3) + 'px';
    container.appendChild(star);
  }
}

// ===== SCREEN MANAGEMENT =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function showPortal(type, text, callback) {
  const portal = document.getElementById('portal');
  const portalText = document.getElementById('portal-text');
  portal.className = 'portal-overlay portal-to-' + type;
  portalText.textContent = text;
  portal.classList.add('active');
  setTimeout(() => {
    callback();
    setTimeout(() => {
      portal.classList.remove('active');
    }, 300);
  }, 800);
}

// ===== TITLE SCREEN =====
function startGame() {
  loadState();
  showScreen('chapter-select');
  renderChapterGrid();
}

// ===== CHAPTER SELECT =====
function renderChapterGrid() {
  const grid = document.getElementById('chapter-grid');
  const completedCount = gameState.completed.length;
  
  grid.innerHTML = CHAPTERS.map((ch, i) => {
    const isCompleted = gameState.completed.includes(ch.id);
    const isLocked = i > 0 && !gameState.completed.includes(CHAPTERS[i-1].id) && !isCompleted;
    const cls = isCompleted ? 'completed' : (isLocked ? 'locked' : '');
    
    return `
      <div class="chapter-card ${cls}" onclick="${isLocked ? '' : `startChapter(${i})`}">
        <div class="chapter-num">${ch.num}</div>
        <div class="chapter-title">${ch.title}</div>
        <div class="chapter-excerpt">${ch.excerpt}</div>
      </div>
    `;
  }).join('');

  document.getElementById('progress-text').textContent = `${completedCount} / 10`;
  document.getElementById('progress-fill').style.width = (completedCount * 10) + '%';
}

// ===== GAME STEPS =====
// Steps: 0=worldB, 1=worldA, 2=discovery, 3=reflection, 4=stockStory, 5=complete
function startChapter(index) {
  gameState.currentChapter = index;
  gameState.currentStep = 0;
  
  showPortal('b', '世界線Bへ移動中...', () => {
    showScreen('game-screen');
    renderStep();
  });
}

function renderStep() {
  const ch = CHAPTERS[gameState.currentChapter];
  const step = gameState.currentStep;
  const gs = document.getElementById('game-screen');
  const content = document.getElementById('game-content');
  const worldName = document.getElementById('world-name');
  const stepInd = document.getElementById('step-indicator');
  
  // Set world class
  gs.className = 'screen active';
  
  const stepLabels = ['世界線B', '世界線A', '違いの発見', '振り返り', 'Stockの実話', 'クリア'];
  stepInd.textContent = `${step + 1} / 6`;
  
  if (step === 0) {
    // World B
    gs.classList.add('world-b');
    worldName.textContent = '世界線B ― 考え方のない世界';
    const wb = ch.worldB;
    content.innerHTML = `
      <div class="scene-card">
        <span class="scene-emoji">${wb.emoji}</span>
        <span class="scene-label">${wb.label}</span>
        <h2 class="scene-title">${wb.title}</h2>
        <p class="scene-text">${wb.text}</p>
        <div class="scene-dialogue">
          <span class="dialogue-speaker">💬 ${wb.dialogue.speaker}</span>
          ${wb.dialogue.text}
        </div>
        <p class="scene-text" style="margin-top:1rem;font-weight:500;">${wb.consequence}</p>
        <div style="text-align:center">
          <button class="btn-next" onclick="goToWorldA()">
            もう一つの世界を見る →
          </button>
        </div>
      </div>
    `;
  } else if (step === 1) {
    // World A
    gs.classList.add('world-a');
    worldName.textContent = '世界線A ― 考え方のある世界';
    const wa = ch.worldA;
    content.innerHTML = `
      <div class="scene-card">
        <span class="scene-emoji">${wa.emoji}</span>
        <span class="scene-label">${wa.label}</span>
        <h2 class="scene-title">${wa.title}</h2>
        <p class="scene-text">${wa.text}</p>
        <div class="scene-dialogue">
          <span class="dialogue-speaker">💬 ${wa.dialogue.speaker}</span>
          ${wa.dialogue.text}
        </div>
        <p class="scene-text" style="margin-top:1rem;font-weight:500;">${wa.consequence}</p>
        <div style="text-align:center">
          <button class="btn-next" onclick="goToDiscovery()">
            違いを見つける →
          </button>
        </div>
      </div>
    `;
  } else if (step === 2) {
    // Discovery
    gs.classList.add('world-a');
    worldName.textContent = '違いの発見';
    const d = ch.discovery;
    content.innerHTML = `
      <div class="scene-card">
        <span class="scene-emoji">🔍</span>
        <span class="scene-label">DISCOVERY</span>
        <h2 class="scene-title">${d.question}</h2>
        <div class="choices" id="discovery-choices">
          ${d.choices.map((c, i) => `
            <button class="choice-btn" onclick="selectDiscovery(${i})">${c}</button>
          `).join('')}
        </div>
        <div id="discovery-result" style="display:none"></div>
      </div>
    `;
  } else if (step === 3) {
    // Reflection
    gs.classList.add('world-reflect');
    worldName.textContent = '振り返り';
    const r = ch.reflection;
    content.innerHTML = `
      <div class="scene-card">
        <span class="scene-emoji">🪞</span>
        <span class="scene-label">SELF-REFLECTION</span>
        <h2 class="scene-title">${r.question}</h2>
        <p class="scene-text">どれか一つ、あなたに近いものを選んでください。<br>正解・不正解はありません。</p>
        <div class="choices" id="reflect-choices">
          ${r.options.map((o, i) => `
            <button class="reflect-option" onclick="selectReflection(${i})">
              ${o.emoji} ${o.text}
            </button>
          `).join('')}
        </div>
        <div id="reflect-result" style="display:none"></div>
      </div>
    `;
  } else if (step === 4) {
    // Stock Story
    gs.classList.add('world-story');
    worldName.textContent = 'Stockの実話';
    const s = ch.stockStory;
    content.innerHTML = `
      <div class="scene-card">
        <span class="scene-emoji">📖</span>
        <span class="scene-label">STOCK'S REAL STORY</span>
        <h2 class="scene-title">Stockでは、実際にこうしています</h2>
        <p class="scene-text">${s.text.replace(/\n/g, '<br>')}</p>
        <div class="stock-quote">
          <p>${s.quote}</p>
        </div>
        <div style="text-align:center">
          <button class="btn-next" onclick="completeChapter()">
            この世界線の探索を完了する ✓
          </button>
        </div>
      </div>
    `;
  } else if (step === 5) {
    // Complete
    gs.classList.add('world-story');
    worldName.textContent = 'クリア！';
    const s = ch.stockStory;
    content.innerHTML = `
      <div class="chapter-complete">
        <div class="badge">🌟</div>
        <h3>${ch.num} クリア！</h3>
        <p>新たな考え方を発見しました</p>
        <div class="philosophy-reveal">
          <h4>STOCK PHILOSOPHY #${ch.id}</h4>
          <p>${s.philosophy}</p>
        </div>
        <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-top:2rem">
          <button class="btn-next" onclick="backToChapters()" style="background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.2)">
            マップに戻る
          </button>
          ${gameState.currentChapter < 9 ? `
            <button class="btn-next" onclick="nextChapter()">
              次の世界線へ →
            </button>
          ` : `
            <button class="btn-next" onclick="showEnding()">
              エンディングへ →
            </button>
          `}
        </div>
      </div>
    `;
  }
}

function goToWorldA() {
  gameState.currentStep = 1;
  showPortal('a', '世界線Aへ移動中...', () => { renderStep(); });
}

function goToDiscovery() {
  gameState.currentStep = 2;
  renderStep();
}

function selectDiscovery(index) {
  const ch = CHAPTERS[gameState.currentChapter];
  const d = ch.discovery;
  const btns = document.querySelectorAll('#discovery-choices .choice-btn');
  
  btns.forEach((btn, i) => {
    btn.classList.toggle('selected', i === index);
    btn.onclick = null;
  });
  
  const result = document.getElementById('discovery-result');
  const isBest = index === d.bestIndex || d.bestIndex === -1;
  
  result.style.display = 'block';
  result.innerHTML = `
    <div class="reflect-response">
      <p>${d.explanation}</p>
    </div>
    <div style="text-align:center">
      <button class="btn-next" onclick="goToReflection()">
        自分を振り返る →
      </button>
    </div>
  `;
}

function goToReflection() {
  gameState.currentStep = 3;
  showPortal('reflect', '振り返りの空間へ...', () => { renderStep(); });
}

function selectReflection(index) {
  const ch = CHAPTERS[gameState.currentChapter];
  const r = ch.reflection;
  const option = r.options[index];
  
  const btns = document.querySelectorAll('#reflect-choices .reflect-option');
  btns.forEach((btn, i) => {
    if (i === index) {
      btn.style.borderColor = '#a78bfa';
      btn.style.background = 'rgba(167,139,250,0.15)';
    }
    btn.onclick = null;
    btn.style.cursor = 'default';
  });
  
  // Save reflection
  gameState.reflections[gameState.currentChapter] = index;
  saveState();
  
  const result = document.getElementById('reflect-result');
  result.style.display = 'block';
  result.innerHTML = `
    <div class="reflect-response">
      <p>${option.response}</p>
    </div>
    <div style="text-align:center">
      <button class="btn-next" style="background:linear-gradient(135deg,var(--stock-gold),#f0c030);color:var(--stock-blue);" onclick="goToStory()">
        Stockの実話を見る →
      </button>
    </div>
  `;
}

function goToStory() {
  gameState.currentStep = 4;
  showPortal('story', 'Stockの実話へ...', () => { renderStep(); });
}

function completeChapter() {
  const ch = CHAPTERS[gameState.currentChapter];
  if (!gameState.completed.includes(ch.id)) {
    gameState.completed.push(ch.id);
  }
  saveState();
  gameState.currentStep = 5;
  renderStep();
}

function nextChapter() {
  const nextIdx = gameState.currentChapter + 1;
  if (nextIdx < CHAPTERS.length) {
    startChapter(nextIdx);
  }
}

function backToChapters() {
  showScreen('chapter-select');
  renderChapterGrid();
}

// ===== ENDING =====
function showEnding() {
  showScreen('ending-screen');
  const content = document.getElementById('ending-content');
  
  // Create confetti
  const colors = ['#4ecdc4', '#f7a072', '#ffd93d', '#a78bfa', '#e94560'];
  let confettiHTML = '';
  for (let i = 0; i < 40; i++) {
    const color = colors[Math.floor(Math.random() * colors.length)];
    confettiHTML += `<div class="confetti" style="
      left:${Math.random()*100}%;
      background:${color};
      animation-delay:${Math.random()*3}s;
      animation-duration:${2+Math.random()*3}s;
      border-radius:${Math.random()>0.5?'50%':'2px'};
      width:${6+Math.random()*8}px;
      height:${6+Math.random()*8}px;
    "></div>`;
  }
  
  content.innerHTML = `
    ${confettiHTML}
    <h2>🎉 全10の世界線を探索しました！</h2>
    <p>あなたは今、Stockが大切にしている10の考え方を<br>ふたつの世界線の対比を通じて体験しました。</p>
    
    <div class="ending-summary">
      <h3>発見した10の考え方</h3>
      ${CHAPTERS.map(ch => `
        <div class="ending-item">
          <span class="num">#${ch.id}</span>
          <span class="text">${ch.stockStory.philosophy}</span>
        </div>
      `).join('')}
    </div>
    
    <div class="ending-message">
      <p>
        これらの考え方は、ルールや規則ではありません。<br>
        Stockで働く全員が、日々の行動の中で<br>
        自然に実践している「文化」です。<br><br>
        あなたも今日から、<br>
        <strong>「自分たちが存在する世界線」の差分を広げる一員</strong>です。<br><br>
        Stockは、あなたと一緒に働けることを<br>
        心から楽しみにしています。
      </p>
    </div>
    
    <button class="btn-restart" onclick="resetGame()">
      🔄 最初からプレイする
    </button>
  `;
}

function resetGame() {
  gameState = { currentChapter: 0, currentStep: 0, completed: [], reflections: [] };
  saveState();
  showScreen('title-screen');
}

// ===== INIT =====
loadState();
createStars();
